<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Maison Royale</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #f59e0b;
    }
    
    p {
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(245, 158, 11, 0.3);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #6b7280;
    }
    
    .online {
      color: #10b981;
    }
    
    .offline {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      Looks like you've lost your internet connection. 
      Don't worry, any changes you make will sync automatically when you're back online.
    </p>
    <button class="retry-btn" onclick="retry()">Try Again</button>
    <div class="status" id="status">
      Status: <span class="offline">Offline</span>
    </div>
  </div>

  <script>
    function retry() {
      window.location.reload();
    }

    // Listen for online/offline events
    window.addEventListener('online', () => {
      document.getElementById('status').innerHTML = 
        'Status: <span class="online">Back Online! Syncing...</span>';
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    });

    window.addEventListener('offline', () => {
      document.getElementById('status').innerHTML = 
        'Status: <span class="offline">Offline</span>';
    });

    // Check status on load
    if (navigator.onLine) {
      document.getElementById('status').innerHTML = 
        'Status: <span class="online">Online - Reload to continue</span>';
    }
  </script>
</body>
</html>
